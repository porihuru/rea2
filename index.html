<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>納入台帳 貼り付けテキスト解析ツール v2026.03.06-01</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      margin: 10px;
      position: relative;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 6px;
    }
    textarea {
      box-sizing: border-box;
    }
    #src {
      width: 100%;
      height: 80px; /* 貼り付け欄は約 1/3 高さ */
    }
    button {
      margin-right: 6px;
      padding: 4px 12px;
      font-size: 12px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 8px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 3px 4px;
      font-size: 12px;
      vertical-align: top;
    }
    th {
      background: #eee;
    }
    .small {
      font-size: 11px;
      color: #555;
    }
    #headerBox {
      margin-top: 8px;
      padding: 4px 6px;
      border: 1px solid #999;
      background: #fafafa;
      white-space: pre-line;
    }
    #sumBox {
      margin-top: 6px;
      padding: 4px 6px;
      border: 1px solid #999;
      background: #f6f6f6;
      white-space: pre-line;
    }
    .version-label {
      position: absolute;
      right: 10px;
      top: 4px;
      font-size: 11px;
      color: #666;
    }
    .spec-input,
    .name-input,
    .unit-input,
    .qty-input,
    .price-input {
      width: 100%;
      box-sizing: border-box;
      font-size: 12px;
    }
    .unit-input {
      text-align: center;
    }
    .qty-input,
    .price-input {
      text-align: right;
    }
    #bulkSpecText {
      font-size: 12px;
      padding: 2px 4px;
      width: 160px;
      box-sizing: border-box;
      margin-right: 4px;
    }
    #toText,
    #vendorText {
      width: 100%;
      box-sizing: border-box;
      font-size: 12px;
    }
    #billDate {
      font-size: 12px;
      padding: 2px 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <!-- 右上のバージョン情報 -->
  <div class="version-label" id="versionLabel">
    v2026.03.06-01
  </div>

  <h1>納入台帳 貼り付けテキスト解析ツール</h1>
  <p class="small">
    PDFビューア等からテキストをコピーして下の欄に貼り付けると、<br>
    自動で解析して「No / 品名 / 規格 / 単位 / 合計数量 / 契約単価 / 金額 / 備考」を抽出します。<br>
    （解析ボタンは不要です）
  </p>

  <textarea id="src" placeholder="ここに納入台帳のテキストを貼り付け"></textarea>

  <div style="margin-top: 6px;">
    <button id="btnClear">クリア</button>
    <button id="btnSaveLocal">データ保存</button>
    <button id="btnOpenLocal">データを開く</button>
  </div>

  <!-- 納地・業者名などのヘッダー情報表示 -->
  <div id="headerBox" class="small">
    ここに納地・業者名ヘッダーが表示されます。
  </div>

  <!-- 日付入力（宛先の上） -->
  <div id="dateBox" class="small" style="margin-top: 6px;">
    日付:
    <input id="billDate" type="date">
  </div>

  <!-- 宛先・業者名（宛先用）入力 -->
  <div id="addressBox" class="small" style="margin-top: 6px;">
    <div>
      宛先（3行）:
      <br>
      <textarea id="toText" rows="3" placeholder="例）滝川駐屯地 会計隊 御中&#10;〒000-0000 滝川市...&#10;TEL 0123-45-6789"></textarea>
    </div>
    <div style="margin-top: 4px;">
      業者名（5行）:
      <br>
      <textarea id="vendorText" rows="5" placeholder="1行目に業者名が自動入力されます。&#10;2行目以降に住所・TEL・担当者などを記入してください。"></textarea>
    </div>
  </div>

  <div style="margin-top: 6px;">
    <!-- 規格一括入力テキスト＋ボタン＋全データコピー＋印刷 -->
    <input id="bulkSpecText" type="text" value="規格表のとおり" >
    <button id="btnBulkSpec">規格欄一括入力</button>

    <!-- ★ここを追加★ -->
    <button id="btnGyousya">業者名等反映</button>
    <!-- ★ここまで追加★ -->

    <button id="btnCopyAll">全データコピー</button>

    <!-- ★これを追加★ -->
    <button id="btnPrintText">テキスト印刷</button>
    <!-- ★ここまで追加★ -->

    <button id="btnPrint">印刷</button>
    <span id="copyMsg" class="small"></span>
  </div>

  <div id="summary" class="small" style="margin-top: 6px;"></div>
  <div id="result"></div>
  <div id="sumBox" class="small"></div>

  <!-- 解析用パーサ -->
  <script src="casks/ledger_paste_parser.js"></script>

   <!-- ★ここから追加★ 業者マスタ（gyousya.js）読込 ★ -->
  <script src="casks/gyousya.js"></script>
  <!-- ★ここまで追加★ -->

  <!-- 印刷用スクリプト -->
  <script src="casks/print.js"></script>

<script src="casks/main.js"></script>
</body>
</html>
